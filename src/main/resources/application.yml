spring:
  datasource:
    url: jdbc:mysql://localhost:3307/project_si_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
    username: project_user        # Utilisateur créé par Docker
    password: project_pass        # Mot de passe défini dans .env
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update            # Met à jour automatiquement le schéma
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080                     # Port Spring Boot