spring:
  datasource:
    url: jdbc:mysql://localhost:3306/projetsi?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
    username: root                  # Remplace par ton utilisateur MySQL
    password: ton_mot_de_passe_mysql # Remplace par ton mot de passe MySQL
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update               # "update" pour mettre à jour le schéma automatiquement
    show-sql: true                    # Affiche les requêtes SQL dans la console
    properties:
      hibernate:
        format_sql: true              # Formatage lisible du SQL
        dialect: org.hibernate.dialect.MySQLDialect # Dialect explicit pour MySQL

# Optionnel : serveur sur un port spécifique
server:
  port: 8080